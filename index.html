<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickCart</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar bg-secondary px-3">
  <h5 class="text-white mb-0">QuickCart</h5>

  <span class="text-white ms-auto">
    Cart: <b id="cart-count">0</b>
  </span>
</nav>
  </div>
</nav>

<div class="container mt-3">
  <div class="row g-2">
    <div class="col-md-4">
      <input type="text" id="search" class="form-control" placeholder="Search product">
    </div>

    <div class="col-md-4">
      <select id="category" class="form-select">
        <option value="all">All Categories</option>
      </select>
    </div>

    <div class="col-md-4">
      <select id="sort" class="form-select">
        <option value="">Sort</option>
        <option value="low">Low → High</option>
        <option value="high">High → Low</option>
      </select>
    </div>
  </div>
</div>

<div id="loader" class="text-center mt-3">Loading...</div>
<div id="error" class="text-center text-danger"></div>

<div class="container mt-3">
  <div class="row" id="products"></div>
</div>

<script src="script.js"></script>
</body>
</html>
